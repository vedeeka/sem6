<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WristMatch — Find Your Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
    :root {
        --bg:       #f7f5f2;
        --surface:  #ffffff;
        --card:     #ffffff;
        --border:   #e0dbd4;
        --gold:     #a8782a;
        --gold-lt:  #c9922e;
        --text:     #1a1714;
        --muted:    #9a918a;
        --yes:      #a8782a;
        --no:       #e8e3dc;
        --radius:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem 4rem;
        background-image:
            radial-gradient(ellipse 60% 40% at 50% -10%, rgba(168,120,42,.08) 0%, transparent 60%);
    }

    header {
        text-align: center;
        margin-bottom: 2.8rem;
        animation: fadeDown .7s ease both;
    }
    header .label {
        font-size: .72rem;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: .5rem;
    }
    header h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        line-height: 1.1;
    }
    header p {
        color: var(--muted);
        font-size: .9rem;
        margin-top: .6rem;
        font-weight: 300;
    }

    .progress-wrap {
        width: min(640px, 100%);
        margin-bottom: 1.8rem;
        animation: fadeDown .7s .1s ease both;
    }
    .progress-meta {
        display: flex;
        justify-content: space-between;
        font-size: .78rem;
        color: var(--muted);
        margin-bottom: .45rem;
    }
    .progress-track {
        height: 3px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--gold), var(--gold-lt));
        border-radius: 99px;
        transition: width .4s ease;
    }

    .quiz-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2.4rem 2rem;
        width: min(640px, 100%);
        animation: fadeDown .7s .15s ease both;
    }

    .question-num {
        font-size: .72rem;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: .8rem;
    }
    .question-text {
        font-family: 'Playfair Display', serif;
        font-size: clamp(1.1rem, 2.5vw, 1.35rem);
        font-weight: 400;
        line-height: 1.45;
        margin-bottom: 2rem;
        min-height: 3.5rem;
    }

    .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: .75rem;
    }
    .btn-ans {
        padding: .9rem;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        font-family: 'DM Sans', sans-serif;
        font-size: .9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all .2s;
        letter-spacing: .04em;
        background: var(--surface);
        color: var(--text);
    }
    .btn-ans:hover { border-color: var(--gold); color: var(--gold-lt); }
    .btn-ans.selected-yes {
        background: rgba(201,168,76,.15);
        border-color: var(--gold);
        color: var(--gold-lt);
    }
    .btn-ans.selected-no {
        background: rgba(255,255,255,.04);
        border-color: #555;
        color: var(--muted);
    }

    .nav-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1.6rem;
        gap: .75rem;
    }
    .btn-nav {
        padding: .65rem 1.4rem;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: 'DM Sans', sans-serif;
        font-size: .85rem;
        cursor: pointer;
        transition: all .2s;
    }
    .btn-nav:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .btn-nav:disabled { opacity: .3; cursor: default; }

    .btn-submit {
        padding: .75rem 2rem;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
        color: #0d0d0d;
        font-family: 'DM Sans', sans-serif;
        font-size: .9rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: .04em;
        transition: opacity .2s, transform .15s;
        display: none;
    }
    .btn-submit:hover { opacity: .9; transform: translateY(-1px); }

    #result {
        display: none;
        width: min(640px, 100%);
        animation: fadeUp .6s ease both;
    }
    .result-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2.4rem 2rem;
        text-align: center;
        margin-bottom: 1.2rem;
        position: relative;
        overflow: hidden;
    }
    .result-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,168,76,.09) 0%, transparent 70%);
        pointer-events: none;
    }
    .result-emoji { font-size: 3rem; margin-bottom: .6rem; }
    .result-brand {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 700;
        color: var(--gold-lt);
        letter-spacing: .06em;
        margin-bottom: .4rem;
    }
    .result-tagline {
        color: var(--muted);
        font-size: .92rem;
        font-weight: 300;
        margin-bottom: 1.8rem;
    }

    .scores-title {
        font-size: .72rem;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1rem;
        text-align: left;
    }
    .score-row {
        display: flex;
        align-items: center;
        gap: .8rem;
        margin-bottom: .65rem;
    }
    .score-label {
        width: 4.5rem;
        font-size: .8rem;
        font-weight: 500;
        text-align: right;
        flex-shrink: 0;
    }
    .score-bar-track {
        flex: 1;
        height: 6px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
    }
    .score-bar-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--border);
        transition: width .8s cubic-bezier(.22,1,.36,1);
    }
    .score-bar-fill.winner {
        background: linear-gradient(90deg, var(--gold), var(--gold-lt));
    }
    .score-val {
        width: 1.8rem;
        font-size: .78rem;
        color: var(--muted);
        flex-shrink: 0;
    }

    .btn-retry {
        width: 100%;
        padding: .85rem;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: .9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all .2s;
        letter-spacing: .04em;
        margin-top: .4rem;
    }
    .btn-retry:hover { border-color: var(--gold); color: var(--gold); }

    .error-msg {
        background: rgba(200,70,70,.15);
        border: 1px solid rgba(200,70,70,.35);
        border-radius: 8px;
        padding: .8rem 1rem;
        font-size: .85rem;
        color: #f08080;
        margin-top: 1rem;
        display: none;
    }

    .spinner {
        display: inline-block;
        width: 18px; height: 18px;
        border: 2px solid rgba(13,13,13,.3);
        border-top-color: #0d0d0d;
        border-radius: 50%;
        animation: spin .6s linear infinite;
        vertical-align: middle;
        margin-right: .4rem;
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeDown{ from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px);  } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<header>
    <div class="label">Watch Finder</div>
    <h1>Find Your Perfect Wrist&shy;watch</h1>
    <p>20 questions · under 2 minutes</p>
</header>

<div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
        <span id="progressLabel">Question 1 of 20</span>
        <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
</div>

<div class="quiz-card" id="quizCard">
    <div class="question-num" id="qNum">01 / 20</div>
    <div class="question-text" id="qText">Loading questions…</div>
    <div class="btn-row">
        <button class="btn-ans" id="btnYes" onclick="answer(true)">✓ &nbsp; Yes</button>
        <button class="btn-ans" id="btnNo"  onclick="answer(false)">✕ &nbsp; No</button>
    </div>
    <div class="nav-row">
        <button class="btn-nav" id="btnBack" onclick="goBack()">← Back</button>
        <span style="font-size:.78rem;color:var(--muted)" id="answerHint">Select an answer</span>
        <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()">
            Get My Watch
        </button>
        <button class="btn-nav" id="btnNext" onclick="goNext()" disabled>Next →</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
</div>

<div id="result">
    <div class="result-card">
        <div class="result-emoji" id="resEmoji"></div>
        <div class="result-brand"  id="resBrand"></div>
        <div class="result-tagline" id="resTagline"></div>
        <div class="scores-title">Score breakdown</div>
        <div id="scoreBars"></div>
    </div>
    <button class="btn-retry" onclick="restart()">↩ &nbsp; Retake the quiz</button>
</div>

<script>
    const API = "http://127.0.0.1:5000/api";

    let questions = [];
    let answers   = [];
    let current   = 0;

    async function loadQuestions() {
        try {
            const res  = await fetch(`${API}/questions`);
            const data = await res.json();
            questions  = data.questions;
            answers    = new Array(questions.length).fill(null);
            renderQuestion();
        } catch (e) {
            showError("Could not reach the API. Make sure app.py is running on port 5000.");
        }
    }

    function renderQuestion() {
        const q   = questions[current];
        const n   = questions.length;
        const num = String(current + 1).padStart(2, "0");

        document.getElementById("qNum").textContent   = `${num} / ${n}`;
        document.getElementById("qText").textContent  = q.text;
        document.getElementById("progressLabel").textContent = `Question ${current + 1} of ${n}`;

        const answered = answers.filter(a => a !== null).length;
        const pct = Math.round((answered / n) * 100);
        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("progressPct").textContent  = pct + "%";

        const cur = answers[current];
        document.getElementById("btnYes").className = "btn-ans" + (cur === true  ? " selected-yes" : "");
        document.getElementById("btnNo").className  = "btn-ans" + (cur === false ? " selected-no"  : "");

        document.getElementById("btnBack").disabled = current === 0;
        document.getElementById("answerHint").textContent =
            cur !== null ? "" : "Select an answer";

        const isLast = current === n - 1;
        document.getElementById("btnNext").style.display   = isLast ? "none" : "inline-block";
        document.getElementById("btnSubmit").style.display = isLast ? "inline-block" : "none";

        if (!isLast) {
            document.getElementById("btnNext").disabled = cur === null;
        }
    }

    function answer(val) {
        answers[current] = val;
        renderQuestion();
        if (current < questions.length - 1) {
            setTimeout(() => { current++; renderQuestion(); }, 260);
        }
    }

    function goNext() {
        if (current < questions.length - 1) { current++; renderQuestion(); }
    }

    function goBack() {
        if (current > 0) { current--; renderQuestion(); }
    }

    async function submitQuiz() {
        if (answers.includes(null)) {
            showError("Please answer all questions before submitting.");
            return;
        }
        const btn = document.getElementById("btnSubmit");
        btn.innerHTML = '<span class="spinner"></span>Analysing…';
        btn.disabled = true;
        hideError();

        try {
            const res  = await fetch(`${API}/recommend`, {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body:    JSON.stringify({ answers })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "API error");
            showResult(data);
        } catch (e) {
            showError(e.message);
            btn.innerHTML = "Get My Watch";
            btn.disabled = false;
        }
    }

    function showResult(data) {
        document.getElementById("quizCard").style.display    = "none";
        document.getElementById("progressWrap").style.display = "none";
        document.getElementById("result").style.display      = "block";

        const rec = data.recommendation;
        document.getElementById("resEmoji").textContent   = rec.emoji;
        document.getElementById("resBrand").textContent   = rec.brand;
        document.getElementById("resTagline").textContent = rec.tagline;

        const scores  = data.scores;
        const maxVal  = Math.max(...Object.values(scores));
        const barsEl  = document.getElementById("scoreBars");
        barsEl.innerHTML = "";

        Object.entries(scores).forEach(([brand, val]) => {
            const isWinner = brand === rec.brand;
            const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
            barsEl.innerHTML += `
                <div class="score-row">
                    <div class="score-label" style="${isWinner ? 'color:var(--gold-lt);font-weight:600' : ''}">${brand}</div>
                    <div class="score-bar-track">
                        <div class="score-bar-fill ${isWinner ? 'winner' : ''}" style="width:0%" data-pct="${pct}"></div>
                    </div>
                    <div class="score-val">${val}</div>
                </div>`;
        });

        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.querySelectorAll(".score-bar-fill").forEach(el => {
                el.style.width = el.dataset.pct + "%";
            });
        }));
    }

    function restart() {
        answers  = new Array(questions.length).fill(null);
        current  = 0;
        document.getElementById("result").style.display       = "none";
        document.getElementById("quizCard").style.display     = "block";
        document.getElementById("progressWrap").style.display = "block";
        document.getElementById("btnSubmit").innerHTML = "Get My Watch";
        document.getElementById("btnSubmit").disabled  = false;
        renderQuestion();
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideError() {
        document.getElementById("errorMsg").style.display = "none";
    }

    loadQuestions();
</script>
</body>
</html>
